[defaults]
inventory          = inventory.ini
host_key_checking  = False
timeout            = 30
forks              = 10
stdout_callback    = default
result_format      = yaml
gathering          = smart
fact_caching       = memory
roles_path         = roles

[ssh_connection]
pipelining         = True
ssh_args           = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
